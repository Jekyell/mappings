# 工作流名称，会显示在 GitHub 的 "Actions" 页面
name: Process Skill Detail JSON

# 触发条件：当对主分支（main或master）的推送中
# 包含了对根目录下 skill_detail.json 文件的更改时，此工作流将被触发
on:
  push:
    branches:
      - main
      - master
    paths:
      - 'skill_detail.json'

# 工作流中要执行的任务
jobs:
  # 定义一个名为 "process-json" 的任务
  process-json:
    # 使用最新的 Ubuntu 虚拟机来运行此任务
    runs-on: ubuntu-latest

    # 任务执行的步骤
    steps:
      # 第一步：检出仓库代码
      # 这是必需的步骤，以便工作流可以访问你的 skill_detail.json 文件
      - name: Check out repository
        uses: actions/checkout@v4

      # 第二步：设置 Python 环境
      # 我们将使用 Python 来处理 JSON，因为它非常适合这类任务
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 使用一个稳定的 Python 版本

      # 第三步：执行核心处理逻辑
      # 这个步骤会运行一个 Python 脚本来读取、筛选和生成新的 JSON 文件
      - name: Process skill_detail.json and create new file
        run: |
          import json
          import os

          # 定义文件路径
          input_file = 'skill_detail.json'
          output_dir = 'F_Replace'
          output_file = os.path.join(output_dir, 'skill_detail.json')

          # 创建输出目录（如果它不存在）
          os.makedirs(output_dir, exist_ok=True)

          print(f"Reading from {input_file}...")

          # 读取原始 JSON 文件
          try:
            with open(input_file, 'r', encoding='utf-8') as f:
              data = json.load(f)
          except FileNotFoundError:
            print(f"Error: {input_file} not found. Exiting.")
            exit(1)
          except json.JSONDecodeError:
            print(f"Error: Failed to decode JSON from {input_file}. Exiting.")
            exit(1)

          # 创建一个新的字典来存储处理后的数据
          new_skill_data = {}
          processed_count = 0

          # 遍历原始数据
          for key, value in data.items():
            # 筛选条件：只处理 key 中包含 "▲" 的条目
            if '▲' in key:
              # 提取 "CN" 字段的值
              # 确保 "CN" 存在且其值不为空
              if isinstance(value, dict) and 'CN' in value and value['CN']:
                new_skill_data[key] = value['CN']
                processed_count += 1

          print(f"Found and processed {processed_count} entries with '▲'.")

          # 将新的字典写入到目标文件中
          with open(output_file, 'w', encoding='utf-8') as f:
            # ensure_ascii=False 确保中文字符被正确写入，而不是作为 ASCII 转义序列
            # indent=2 使输出的 JSON 文件格式化，易于阅读
            json.dump(new_skill_data, f, ensure_ascii=False, indent=2)

          print(f"Successfully created new skill_detail.json at {output_file}")

      # 第四步：自动提交和推送生成的文件
      # 这个步骤会将新生成的 F_Replace/skill_detail.json 文件提交回你的仓库
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # 提交信息
          commit_message: "[Automated] Update F_Replace/skill_detail.json"
          
          # 指定要提交的文件模式
          file_pattern: 'F_Replace/skill_detail.json'
          
          # 提交者信息
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
