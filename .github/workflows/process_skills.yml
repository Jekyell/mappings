# 工作流名称，会显示在 GitHub 的 "Actions" 页面
name: Process Skill Detail JSON

# 触发条件
on:
  push:
    branches:
      - main
      - master
    paths:
      - 'skill_detail.json'

# 工作流中要执行的任务
jobs:
  process-json:
    runs-on: ubuntu-latest
    
    # *** 这是新增的、解决问题的关键部分 ***
    # 明确为此任务授予写入仓库内容的权限
    permissions:
      contents: write

    # 任务执行的步骤
    steps:
      # 第一步：检出仓库代码
      - name: Check out repository
        uses: actions/checkout@v4

      # 第二步：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 第三步：执行核心处理逻辑
      - name: Process skill_detail.json and create new file
        run: |
          python - <<EOF
          import json
          import os

          input_file = 'skill_detail.json'
          output_dir = 'F_Replace'
          output_file = os.path.join(output_dir, 'skill_detail.json')

          os.makedirs(output_dir, exist_ok=True)
          print(f"Reading from {input_file}...")

          try:
            with open(input_file, 'r', encoding='utf-8') as f:
              data = json.load(f)
          except Exception as e:
            print(f"Error reading or parsing {input_file}: {e}")
            exit(1)

          new_skill_data = {}
          processed_count = 0

          for key, value in data.items():
            if '▲' in key:
              if isinstance(value, dict) and 'CN' in value and value['CN']:
                new_skill_data[key] = value['CN']
                processed_count += 1

          print(f"Found and processed {processed_count} entries with '▲'.")

          with open(output_file, 'w', encoding='utf-8') as f:
            json.dump(new_skill_data, f, ensure_ascii=False, indent=2)

          print(f"Successfully created new skill_detail.json at {output_file}")
          EOF

      # 第四步：自动提交和推送生成的文件
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Automated] Update F_Replace/skill_detail.json"
          file_pattern: 'F_Replace/skill_detail.json'
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
