name: Anti Harmony JSON Content Replacer

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**.json'

jobs:
  anti-harmony-files:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Anti-Harmony File Script
        run: |
          # 生成临时 Python 脚本
          cat > replace_json_content.py <<'EOF'
          import os

          ANTI_HARMONY_DICT = { 
              "匕见": "荆轲", "虎狼": "吕布", "周照": "武则天", "莲偶": "哪吒", "重瞳": "项羽",
              "忠贞": "秦良玉", "祖政": "始皇帝", "雏罂": "虞美人", "丹驹": "赤兔马", "晋帝": "司马懿",
              "琰女": "杨贵妃", "瞑生院": "杀生院", "歌果": "美杜莎", "爱迪·萨奇": "爱德华·蒂奇",
              "雾都弃子": "开膛手杰克", "西行者": "玄奘三藏", "方巿": "徐福", "吾绰": "呼延灼",
              "暗匿者": "Assassin", "【{0}】": "[{0}]"
          }

          def scan_and_replace():
              has_changes = False
              for root, dirs, files in os.walk("."):
                  if ".git" in dirs: dirs.remove(".git")
                  
                  for file in files:
                      if file.endswith(".json"):
                          file_path = os.path.join(root, file)
                          try:
                              with open(file_path, 'r', encoding='utf-8') as f:
                                  content = f.read()
                              
                              new_content = content
                              for key, value in ANTI_HARMONY_DICT.items():
                                  if key in new_content:
                                      new_content = new_content.replace(key, value)
                              
                              if content != new_content:
                                  print(f"🔄 修改文件: {file_path}")
                                  with open(file_path, 'w', encoding='utf-8') as f:
                                      f.write(new_content)
                                  has_changes = True
                          except Exception as e:
                              print(f"❌ 错误 {file_path}: {e}")
              return has_changes

          if __name__ == "__main__":
              if scan_and_replace():
                  print("DETECT_CHANGE=true")
              else:
                  print("DETECT_CHANGE=false")
          EOF
          
          # 运行脚本，记录日志
          python replace_json_content.py > result.log
          cat result.log

          # 判断是否有变动
          if grep -q "DETECT_CHANGE=true" result.log; then
            echo "CHANGES_FOUND=true" >> $GITHUB_ENV
          else
            echo "CHANGES_FOUND=false" >> $GITHUB_ENV
          fi

          # 🔥【关键修改】在这里删除临时脚本和日志文件
          # 这样下面的 git add . 就不会把它们加进去了
          rm replace_json_content.py result.log

      - name: Commit and Push changes
        if: env.CHANGES_FOUND == 'true'
        run: |
          git config --global user.name "Anti-Harmony Bot"
          git config --global user.email "bot@noreply.github.com"
          
          # 因为上面已经 rm 掉了临时文件，这里只会添加被修改的 JSON
          git add .
          git commit -m "chore: Auto-replace harmony terms in JSON files [skip ci]"
          git push
